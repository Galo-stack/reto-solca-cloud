services:
  mysql-seguridad:
    image: mysql:8.0
    container_name: mysql-seguridad
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_seguridad
    ports:
      - "3311:3306"
    volumes:
      - mysql-seguridad-data:/var/lib/mysql
    networks:
      - solca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-auditoria:
    image: mysql:8.0
    container_name: mysql-auditoria
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_auditoria
    ports:
      - "3312:3306"
    volumes:
      - mysql-auditoria-data:/var/lib/mysql
    networks:
      - solca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-pacientes:
    image: mysql:8.0
    container_name: mysql-pacientes
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_pacientes
    ports:
      - "3307:3306"
    volumes:
      - mysql-pacientes-data:/var/lib/mysql
    networks:
      - solca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-consultas:
    image: mysql:8.0
    container_name: mysql-consultas
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_consultas
    ports:
      - "3308:3306"
    volumes:
      - mysql-consultas-data:/var/lib/mysql
    networks:
      - solca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-laboratorio:
    image: mysql:8.0
    container_name: mysql-laboratorio
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_laboratorio
    ports:
      - "3309:3306"
    volumes:
      - mysql-laboratorio-data:/var/lib/mysql
    networks:
      - solca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-imagenologia:
    image: mysql:8.0
    container_name: mysql-imagenologia
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_imagenologia
    ports:
      - "3310:3306"
    volumes:
      - mysql-imagenologia-data:/var/lib/mysql
    networks:
      - solca-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  paciente-service:
    build:
      context: ./microservicio-pacientes
      dockerfile: Dockerfile
    container_name: paciente-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-pacientes:3306/db_pacientes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&allowMultiQueries=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8081:8081"
    networks:
      - solca-network
    depends_on:
      mysql-pacientes:
        condition: service_healthy
    restart: unless-stopped

  consulta-service:
    build:
      context: ./microservicio-consultas
      dockerfile: Dockerfile
    container_name: consulta-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-consultas:3306/db_consultas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&allowMultiQueries=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8082:8082"
    networks:
      - solca-network
    depends_on:
      mysql-consultas:
        condition: service_healthy
    restart: unless-stopped

  laboratorio-service:
    build:
      context: ./microservicio-laboratorio
      dockerfile: Dockerfile
    container_name: laboratorio-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-laboratorio:3306/db_laboratorio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&allowMultiQueries=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8083:8083"
    networks:
      - solca-network
    depends_on:
      mysql-laboratorio:
        condition: service_healthy
    restart: unless-stopped

  imagenologia-service:
    build:
      context: ./microservicio-imagenologia
      dockerfile: Dockerfile
    container_name: imagenologia-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-imagenologia:3306/db_imagenologia?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&allowMultiQueries=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8084:8084"
    networks:
      - solca-network
    depends_on:
      mysql-imagenologia:
        condition: service_healthy
    restart: unless-stopped

  repositorio-service:
    build:
      context: ./microservicio-repositorio
      dockerfile: Dockerfile
    container_name: repositorio-service
    environment:
      SERVICES_PACIENTES_URL: http://paciente-service:8081
      SERVICES_CONSULTAS_URL: http://consulta-service:8082
      SERVICES_LABORATORIO_URL: http://laboratorio-service:8083
      SERVICES_IMAGENOLOGIA_URL: http://imagenologia-service:8084
    ports:
      - "8085:8085"
    networks:
      - solca-network
    depends_on:
      - paciente-service
      - consulta-service
      - laboratorio-service
      - imagenologia-service
    restart: unless-stopped

  seguridad-service:
    build:
      context: ./microservicio-seguridad
      dockerfile: Dockerfile
    container_name: seguridad-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-seguridad:3306/db_seguridad?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&allowMultiQueries=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8086:8086"
    networks:
      - solca-network
    depends_on:
      mysql-seguridad:
        condition: service_healthy
    restart: unless-stopped

  auditoria-service:
    build:
      context: ./microservicio-auditoria
      dockerfile: Dockerfile
    container_name: auditoria-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auditoria:3306/db_auditoria?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&allowMultiQueries=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8087:8087"
    networks:
      - solca-network
    depends_on:
      mysql-auditoria:
        condition: service_healthy
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-solca
    environment:
      PMA_HOSTS: mysql-pacientes,mysql-consultas,mysql-laboratorio,mysql-imagenologia,mysql-seguridad,mysql-auditoria
      PMA_ARBITRARY: 1
    ports:
      - "8080:80"
    networks:
      - solca-network
    depends_on:
      - mysql-pacientes
      - mysql-consultas
      - mysql-laboratorio
      - mysql-imagenologia
      - mysql-seguridad
      - mysql-auditoria
    restart: unless-stopped

volumes:
  mysql-seguridad-data:
  mysql-auditoria-data:
  mysql-pacientes-data:
  mysql-consultas-data:
  mysql-laboratorio-data:
  mysql-imagenologia-data:

networks:
  solca-network:
    driver: bridge