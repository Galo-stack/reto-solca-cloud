server:
  port: 8085
  servlet:
    context-path: /api

spring:
  application:
    name: repositorio-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3313/db_repositorio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&allowMultiQueries=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

services:
  pacientes:
    url: ${SERVICES_PACIENTES_URL:http://localhost:8081}
  consultas:
    url: ${SERVICES_CONSULTAS_URL:http://localhost:8082}
  laboratorio:
    url: ${SERVICES_LABORATORIO_URL:http://localhost:8083}
  imagenologia:
    url: ${SERVICES_IMAGENOLOGIA_URL:http://localhost:8084}
  auditoria:
    url: ${SERVICES_AUDITORIA_URL:http://localhost:8087}

jwt:
  secret: "bXlzdXBlcnNlY3JldGp3dGtleWZvcnNvbGNhY2xvdWRzeXN0ZW0yMDI0cHJvZHVjdGlvbg=="

logging:
  level:
    com.solca.repositorio: INFO
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
